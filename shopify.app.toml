# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9b1e966350cee0ffb9d2b6f46719da03"
name = "ShopMate AI"
application_url = "https://shopmate-ai-helper-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_orders: needed for order tracking lookups via GraphQL
# read_products: needed for product recommendation queries via GraphQL
scopes = "read_orders,read_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://shopmate-ai-helper-production.up.railway.app/auth/callback",
  "https://shopmate-ai-helper-production.up.railway.app/auth/shopify/callback"
]

[app_proxy]
# Shopify forwards: myshopify.com/{prefix}/{subpath}/* → {url}/{prefix}/{subpath}/*
# The url must be the backend ROOT — Shopify appends the full path automatically.
# Previous value included /apps/shopmate in the url, causing the forwarded path to
# become /apps/shopmate/shopmate/chat (double segment) which breaks HMAC validation
# because the signature is computed over the actual forwarded URL.
url = "https://shopmate-ai-helper-production.up.railway.app"
prefix = "apps"
subpath = "shopmate/chat"
