# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9b1e966350cee0ffb9d2b6f46719da03"
name = "ShopMate AI"
application_url = "https://shopmate-ai-helper-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_orders: needed for order tracking lookups via GraphQL
# read_products: needed for product recommendation queries via GraphQL
scopes = "read_orders,read_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://shopmate-ai-helper-production.up.railway.app/auth/callback",
  "https://shopmate-ai-helper-production.up.railway.app/auth/shopify/callback"
]

[app_proxy]
# Shopify proxy forwarding rule (from docs):
#   storefront: myshopify.com/{prefix}/{subpath}/{rest}
#   forwarded:  {url}/{rest}
#
# Example from Shopify docs:
#   prefix = "apps", subpath = "awesome_reviews", url = "https://proxy-domain.com/proxy"
#   /apps/awesome_reviews/extra/path → https://proxy-domain.com/proxy/extra/path
#
# For ShopMate: storefront /apps/shopmate/chat → Railway /apps/shopmate/chat
#   prefix  = "apps"
#   subpath = "shopmate"       → Shopify matches /apps/shopmate/*
#   url     = "https://...railway.app/apps/shopmate"  → Shopify appends /chat → /apps/shopmate/chat ✓
url = "https://shopmate-ai-helper-production.up.railway.app/apps/shopmate"
prefix = "apps"
subpath = "shopmate"
